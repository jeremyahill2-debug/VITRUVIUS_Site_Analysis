<!DOCTYPE html>
<html style="height: 100%; margin: 0;">
<head>
    <title>NL Maatvoering Downloader</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
    
    <style>
        html, body { height: 100%; margin: 0; padding: 0; }
        #map { height: 100vh; width: 100%; background: #222; }
        #ui {
            position: absolute; top: 10px; right: 10px; z-index: 1000;
            background: white; padding: 15px; border-radius: 8px; width: 220px;
            box-shadow: 0 0 15px rgba(0,0,0,0.2); font-family: sans-serif;
        }
        input { width: 100%; padding: 8px; margin: 5px 0 10px 0; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        #status { margin-top: 10px; font-size: 12px; color: #444; }
    </style>
</head>
<body>

<div id="ui">
    <b style="display:block; margin-bottom:5px;">Maatvoering Tool</b>
    <label style="font-size: 12px;">Radius (meters):</label>
    <input type="number" id="radius" value="500">
    <button id="dlBtn" onclick="downloadData()">Download Data</button>
    <div id="status">Click the map to select a point.</div>
</div>

<div id="map"></div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>

<script>
    // Force a small delay to ensure the DOM is fully ready
    window.onload = function() {
        const map = L.map('map').setView([52.2, 5.3], 7);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        // Visual Overlay for Ruimtelijke Plannen
        L.tileLayer.wms('https://service.pdok.nl/kadaster/plu/wms/v1_0', {
            layers: 'Maatvoering',
            format: 'image/png',
            transparent: true,
            version: '1.3.0',
            opacity: 0.6
        }).addTo(map);

        let selectedPoint = null;
        let circlePreview = null;

        map.on('click', function(e) {
            selectedPoint = e.latlng;
            const r = document.getElementById('radius').value;
            if (circlePreview) {
                circlePreview.setLatLng(selectedPoint).setRadius(r);
            } else {
                circlePreview = L.circle(selectedPoint, {radius: r, color: 'red'}).addTo(map);
            }
            document.getElementById('status').innerText = `Target: ${selectedPoint.lat.toFixed(4)}, ${selectedPoint.lng.toFixed(4)}`;
        });

        window.downloadData = async function() {
            if (!selectedPoint) return alert("Select a point on the map.");
            const r = document.getElementById('radius').value;
            const status = document.getElementById('status');
            status.innerText = "Downloading...";

            const url = `https://service.pdok.nl/kadaster/plu/wfs/v1_0?service=WFS&version=2.0.0&request=GetFeature&typeNames=plu:Maatvoering&outputFormat=application/json&srsName=EPSG:4326&CQL_FILTER=DWITHIN(geometrie,POINT(${selectedPoint.lng} ${selectedPoint.lat}),${r},meters)`;

            try {
                const res = await fetch(url);
                const data = await res.json();
                if (!data.features.length) {
                    status.innerText = "No features found here.";
                    return;
                }
                const blob = new Blob([JSON.stringify(data)], {type: 'application/json'});
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = "maatvoering.geojson";
                a.click();
                status.innerText = `Found ${data.features.length} features!`;
            } catch (e) {
                status.innerText = "Error fetching data.";
                console.error(e);
            }
        };
    };
</script>
</body>
</html>
