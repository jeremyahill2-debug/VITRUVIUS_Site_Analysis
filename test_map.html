<!DOCTYPE html>
<html>
<head>
    <title>NL Ruimtelijke Plannen - Maatvoering Downloader - v6</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; font-family: sans-serif; background: #1a1a1a; }
        #map { height: 100vh; width: 100%; background: #000; cursor: crosshair; }
        #ui {
            position: absolute; top: 15px; right: 15px; z-index: 1000;
            background: white; padding: 20px; border-radius: 12px; width: 220px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
        }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; cursor: pointer; padding: 12px; background: #007bff; color: white; border: none; border-radius: 6px; font-weight: bold; }
        #status { font-size: 12px; margin-top: 10px; color: #555; line-height: 1.4; }
    </style>
</head>
<body>

<div id="ui">
    <strong style="color: #333;">Search Radius (meters)</strong>
    <input type="number" id="radius" value="500">
    <button onclick="downloadData()">Download Maatvoering</button>
    <div id="status">Click the map inside the grey box.</div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.9.0/proj4.js"></script>

<script>
    const map = L.map('map').setView([52.2, 5.3], 7);

    // 1. Base Layer
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
        attribution: '©OpenStreetMap'
    }).addTo(map);

    // 2. The Mask (Greying out outside NL)
    const maskStyle = { color: 'none', fillColor: '#333', fillOpacity: 0.6, interactive: false };
    const nl = { n: 53.7, s: 50.7, w: 3.2, e: 7.3 };
    L.rectangle([[90, -180], [nl.n, 180]], maskStyle).addTo(map); 
    L.rectangle([[nl.s, -180], [-90, 180]], maskStyle).addTo(map); 
    L.rectangle([[nl.n, -180], [nl.s, nl.w]], maskStyle).addTo(map); 
    L.rectangle([[nl.n, nl.e], [nl.s, 180]], maskStyle).addTo(map); 

    // 3. Visual Layers (BAG for properties, PLU for planning)
    L.tileLayer.wms('https://service.pdok.nl/lv/bag/wms/v2_0', {
        layers: 'pand',
        format: 'image/png',
        transparent: true,
        version: '1.3.0',
        minZoom: 16
    }).addTo(map);

    L.tileLayer.wms('https://service.pdok.nl/kadaster/plu/wms/v1_0', {
        layers: 'Maatvoering',
        format: 'image/png',
        transparent: true,
        version: '1.3.0',
        minZoom: 15
    }).addTo(map);

    let selectedPoint = null;
    let circlePreview = null;
    const radiusInput = document.getElementById('radius');
    const statusDiv = document.getElementById('status');

    // RD projection for the WFS query
    const RD = "+proj=sterea +lat_0=52.15616055555555 +lon_0=5.38763888888889 +k=0.9999079 +x_0=155000 +y_0=463000 +ellps=bessel +units=m +no_defs";

    function updateCircle() {
        if (!selectedPoint) return;
        const r = parseInt(radiusInput.value) || 0;
        if (circlePreview) {
            circlePreview.setLatLng(selectedPoint).setRadius(r);
        } else {
            circlePreview = L.circle(selectedPoint, { radius: r, color: '#007bff', fillOpacity: 0.2, weight: 2 }).addTo(map);
        }
    }

    radiusInput.addEventListener('input', updateCircle);
    
    map.on('click', function(e) {
        selectedPoint = e.latlng;
        updateCircle();
        statusDiv.innerHTML = `<b>Target set:</b> ${selectedPoint.lat.toFixed(4)}, ${selectedPoint.lng.toFixed(4)}`;
    });

    async function downloadData() {
        if (!selectedPoint) return alert("Click map first.");
        
        const r = radiusInput.value;
        statusDiv.innerText = "Connecting to PDOK...";

        // Convert Lat/Lon to Dutch RD (X, Y)
        const rdCoords = proj4("WGS84", RD, [selectedPoint.lng, selectedPoint.lat]);
        
        // Construct the WFS URL
        // Using version 1.1.0 can sometimes be more stable for GeoJSON output on older GeoServer setups
        const baseUrl = "https://service.pdok.nl/kadaster/plu/wfs/v1_0";
        const cql = `DWITHIN(geometrie,POINT(${rdCoords[0]} ${rdCoords[1]}),${r},meters)`;
        
        const url = `${baseUrl}?service=WFS&version=1.1.0&request=GetFeature&typeName=plu:Maatvoering&outputFormat=application/json&srsName=EPSG:28992&CQL_FILTER=${encodeURIComponent(cql)}`;

        try {
            const res = await fetch(url);
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            
            const data = await res.json();
            
            if (data.features && data.features.length > 0) {
                const blob = new Blob([JSON.stringify(data)], {type: 'application/json'});
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = `maatvoering_${Date.now()}.geojson`;
                link.click();
                statusDiv.innerText = `Success! Found ${data.features.length} features.`;
            } else {
                statusDiv.innerText = "No features found in this radius.";
            }
        } catch (e) {
            statusDiv.innerText = "Connection error. See console.";
            console.error("WFS Error:", e);
        }
    }
</script>
</body>
</html>
