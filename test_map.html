<!DOCTYPE html>
<html>
<head>
    <title>NL Ruimtelijke Plannen Downloader - Maatvoering v7</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; font-family: sans-serif; background: #1a1a1a; }
        #map { height: 100vh; width: 100%; background: #000; cursor: crosshair; }
        #ui {
            position: absolute; top: 15px; right: 15px; z-index: 1000;
            background: white; padding: 20px; border-radius: 12px; width: 220px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
        }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; cursor: pointer; padding: 12px; background: #007bff; color: white; border: none; border-radius: 6px; font-weight: bold; }
        #status { font-size: 12px; margin-top: 10px; color: #555; line-height: 1.4; }
    </style>
</head>
<body>

<div id="ui">
    <strong style="color: #333;">Search Radius (meters)</strong>
    <input type="number" id="radius" value="500">
    <button onclick="downloadData()">Download Maatvoering</button>
    <div id="status">Zoom in and click the map.</div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    const map = L.map('map').setView([52.2, 5.3], 7);

    // 1. Base Layer
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
        attribution: '©OpenStreetMap'
    }).addTo(map);

    // 2. The Mask (Greying out outside NL)
    const maskStyle = { color: 'none', fillColor: '#333', fillOpacity: 0.6, interactive: false };
    const nl = { n: 53.7, s: 50.7, w: 3.2, e: 7.3 };
    L.rectangle([[90, -180], [nl.n, 180]], maskStyle).addTo(map); 
    L.rectangle([[nl.s, -180], [-90, 180]], maskStyle).addTo(map); 
    L.rectangle([[nl.n, -180], [nl.s, nl.w]], maskStyle).addTo(map); 
    L.rectangle([[nl.n, nl.e], [nl.s, 180]], maskStyle).addTo(map); 

    // 3. Visual Reference Layers
    L.tileLayer.wms('https://service.pdok.nl/lv/bag/wms/v2_0', {
        layers: 'pand',
        format: 'image/png',
        transparent: true,
        version: '1.3.0',
        minZoom: 16
    }).addTo(map);

    L.tileLayer.wms('https://service.pdok.nl/kadaster/plu/wms/v1_0', {
        layers: 'Maatvoering',
        format: 'image/png',
        transparent: true,
        version: '1.3.0',
        minZoom: 15
    }).addTo(map);

    let selectedPoint = null;
    let circlePreview = null;
    const radiusInput = document.getElementById('radius');
    const statusDiv = document.getElementById('status');

    function updateCircle() {
        if (!selectedPoint) return;
        const r = parseInt(radiusInput.value) || 0;
        if (circlePreview) {
            circlePreview.setLatLng(selectedPoint).setRadius(r);
        } else {
            circlePreview = L.circle(selectedPoint, { radius: r, color: '#007bff', fillOpacity: 0.2, weight: 2 }).addTo(map);
        }
    }

    radiusInput.addEventListener('input', updateCircle);
    
    map.on('click', function(e) {
        selectedPoint = e.latlng;
        updateCircle();
        statusDiv.innerHTML = `<b>Target set:</b> ${selectedPoint.lat.toFixed(4)}, ${selectedPoint.lng.toFixed(4)}`;
    });

    async function downloadData() {
        if (!selectedPoint) return alert("Click map first.");
        
        const r = radiusInput.value;
        statusDiv.innerText = "Requesting data via OGC API...";

        // OGC API Features use a Bounding Box (bbox) rather than DWITHIN for simple web requests
        // We calculate a square bbox based on the radius
        const offset = r / 111320; // Rough conversion from meters to degrees
        const bbox = [
            selectedPoint.lng - offset,
            selectedPoint.lat - offset,
            selectedPoint.lng + offset,
            selectedPoint.lat + offset
        ].join(',');

        // Updated Endpoint to OGC API (Modern, JSON-first)
        const apiUrl = `https://api.pdok.nl/kadaster/plu/ogc/v1_0/collections/Maatvoering/items?bbox=${bbox}&f=json`;

        try {
            const res = await fetch(apiUrl);
            if (!res.ok) throw new Error(`HTTP Error: ${res.status}`);
            
            const data = await res.json();
            
            if (data.features && data.features.length > 0) {
                const blob = new Blob([JSON.stringify(data)], {type: 'application/json'});
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = `maatvoering_${Date.now()}.geojson`;
                link.click();
                statusDiv.innerText = `Success! Found ${data.features.length} features.`;
            } else {
                statusDiv.innerText = "No features found in this bbox.";
            }
        } catch (e) {
            statusDiv.innerText = "Error: Connection blocked or API down.";
            console.error(e);
        }
    }
</script>
</body>
</html>
