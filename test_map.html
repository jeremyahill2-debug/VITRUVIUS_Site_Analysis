<!DOCTYPE html>
<html>
<head>
    <title>NL Ruimtelijke Plannen Downloader</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; font-family: sans-serif; background: #1a1a1a; }
        #map { height: 100vh; width: 100%; background: #000; cursor: crosshair; }
        #ui {
            position: absolute; top: 15px; right: 15px; z-index: 1000;
            background: white; padding: 20px; border-radius: 12px; width: 240px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
        }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; cursor: pointer; padding: 12px; background: #007bff; color: white; border: none; border-radius: 6px; font-weight: bold; }
        button:disabled { background: #ccc; }
        #status { font-size: 12px; margin-top: 10px; color: #555; line-height: 1.4; }
    </style>
</head>
<body>

<div id="ui">
    <strong style="color: #333;">Maatvoering Radius (m)</strong>
    <input type="number" id="radius" value="500">
    <button id="dlBtn" onclick="downloadData()">Download Maatvoering</button>
    <div id="status">Zoom in and click to select an area.</div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // 1. Initialize Map (Back to original light style)
    const map = L.map('map').setView([52.2, 5.3], 7);

    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
        attribution: '©OpenStreetMap'
    }).addTo(map);

    // 2. Visual Reference Layer
    const rpLayer = L.tileLayer.wms('https://service.pdok.nl/kadaster/plu/wms/v1_0', {
        layers: 'Maatvoering',
        format: 'image/png',
        transparent: true,
        version: '1.3.0',
        minZoom: 14,
        attribution: '© PDOK'
    }).addTo(map);

    let selectedPoint = null;
    let circlePreview = null;

    const radiusInput = document.getElementById('radius');
    const statusDiv = document.getElementById('status');

    function updateCircle() {
        if (!selectedPoint) return;
        const r = parseInt(radiusInput.value) || 0;
        if (circlePreview) {
            circlePreview.setLatLng(selectedPoint).setRadius(r);
        } else {
            circlePreview = L.circle(selectedPoint, { radius: r, color: '#007bff', fillOpacity: 0.3 }).addTo(map);
        }
    }

    radiusInput.addEventListener('input', updateCircle);
    
    map.on('click', function(e) {
        selectedPoint = e.latlng;
        updateCircle();
        statusDiv.innerHTML = `<b>Target:</b> ${selectedPoint.lat.toFixed(4)}, ${selectedPoint.lng.toFixed(4)}`;
    });

    async function downloadData() {
        if (!selectedPoint) return alert("Please click on the map first.");
        
        const r = radiusInput.value;
        const btn = document.getElementById('dlBtn');
        btn.disabled = true;
        statusDiv.innerText = "Querying PDOK WFS...";

        // The specific WFS params for Ruimtelijke Plannen
        const baseUrl = "https://service.pdok.nl/kadaster/plu/wfs/v1_0";
        
        // Corrected CQL Filter: 
        // 1. Geometry column is usually 'geometrie'
        // 2. We explicitly use EPSG:4326 for the point
        const cqlFilter = `DWITHIN(geometrie,POINT(${selectedPoint.lng} ${selectedPoint.lat}),${r},meters)`;

        const params = new URLSearchParams({
            service: 'WFS',
            version: '2.0.0',
            request: 'GetFeature',
            typeNames: 'Maatvoering', // Removed 'plu:' prefix as it can cause 400 errors depending on the endpoint config
            outputFormat: 'application/json',
            srsName: 'EPSG:4326',
            CQL_FILTER: cqlFilter
        });

        try {
            const response = await fetch(`${baseUrl}?${params.toString()}`);
            
            if (!response.ok) {
                const errorText = await response.text();
                throw new Error(`Server error: ${response.status}`);
            }
            
            const data = await response.json();
            
            if (data.features && data.features.length > 0) {
                const blob = new Blob([JSON.stringify(data)], {type: 'application/json'});
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `maatvoering_${Date.now()}.geojson`;
                a.click();
                statusDiv.innerText = `Success! Found ${data.features.length} features.`;
            } else {
                statusDiv.innerText = "No features found in this circle. Try a larger radius or a different spot.";
            }
        } catch (error) {
            console.error(error);
            statusDiv.innerText = "Error fetching data. Check console for details.";
        } finally {
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
