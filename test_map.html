<!DOCTYPE html>
<html>
<head>
    <title>NL GIS - Local Data Processor</title>
    <link rel="stylesheet" href="[https://unpkg.com/leaflet@1.9.4/dist/leaflet.css](https://unpkg.com/leaflet@1.9.4/dist/leaflet.css)" />
    <style>
        body { margin: 0; font-family: sans-serif; background: #1a1a1a; }
        #map { height: 100vh; width: 100%; background: #000; cursor: crosshair; }
        #ui {
            position: absolute; top: 15px; right: 15px; z-index: 1000;
            background: white; padding: 20px; border-radius: 12px; width: 250px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
        }
        input, .file-label { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; display: block; }
        button { width: 100%; cursor: pointer; padding: 12px; background: #007bff; color: white; border: none; border-radius: 6px; font-weight: bold; }
        #status { font-size: 12px; margin-top: 10px; color: #555; line-height: 1.4; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div id="ui">
    <strong style="color: #333;">1. Load Dataset (.geojson)</strong>
    <input type="file" id="fileInput" accept=".geojson">
    
    <strong style="color: #333;">2. Search Radius (m)</strong>
    <input type="number" id="radius" value="500">
    
    <button onclick="processLocalData()">Extract & Download Area</button>
    <div id="status">Upload a file, then click the map.</div>
</div>

<div id="map"></div>

<script src="[https://unpkg.com/leaflet@1.9.4/dist/leaflet.js](https://unpkg.com/leaflet@1.9.4/dist/leaflet.js)"></script>
<!-- Turf.js for spatial calculations -->
<script src="[https://unpkg.com/@turf/turf@6/turf.min.js](https://unpkg.com/@turf/turf@6/turf.min.js)"></script>

<script>
    const map = L.map('map').setView([52.2, 5.3], 7);
    let fullDataset = null;
    let selectedPoint = null;
    let circlePreview = null;

    // Base Layer & Mask
    L.tileLayer('https://{s}[.basemaps.cartocdn.com/light_all/](https://.basemaps.cartocdn.com/light_all/){z}/{x}/{y}{r}.png').addTo(map);
    const maskStyle = { color: 'none', fillColor: '#333', fillOpacity: 0.6, interactive: false };
    const nl = { n: 53.7, s: 50.7, w: 3.2, e: 7.3 };
    L.rectangle([[90, -180], [nl.n, 180]], maskStyle).addTo(map);
    L.rectangle([[nl.s, -180], [-90, 180]], maskStyle).addTo(map);
    L.rectangle([[nl.n, -180], [nl.s, nl.w]], maskStyle).addTo(map);
    L.rectangle([[nl.n, nl.e], [nl.s, 180]], maskStyle).addTo(map);

    // File Loading Logic
    document.getElementById('fileInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(event) {
            try {
                fullDataset = JSON.parse(event.target.result);
                document.getElementById('status').innerText = `File loaded: ${fullDataset.features.length} features. Now click map.`;
            } catch (err) {
                alert("Error reading GeoJSON file.");
            }
        };
        reader.readAsText(file);
    });

    // Map Interaction
    map.on('click', function(e) {
        selectedPoint = e.latlng;
        const r = parseInt(document.getElementById('radius').value);
        if (circlePreview) {
            circlePreview.setLatLng(selectedPoint).setRadius(r);
        } else {
            circlePreview = L.circle(selectedPoint, { radius: r, color: '#007bff' }).addTo(map);
        }
        document.getElementById('status').innerText = "Area selected. Ready to extract.";
    });

    function processLocalData() {
        if (!fullDataset || !selectedPoint) {
            return alert("Please upload a file AND click the map first.");
        }

        const r = parseInt(document.getElementById('radius').value);
        const center = [selectedPoint.lng, selectedPoint.lat];
        
        document.getElementById('status').innerText = "Processing geometry...";

        // Spatial Filtering with Turf.js
        const filteredFeatures = fullDataset.features.filter(feature => {
            // Calculate distance between click and feature center
            const centerOfFeature = turf.center(feature);
            const distance = turf.distance(center, centerOfFeature, {units: 'meters'});
            return distance <= r;
        });

        if (filteredFeatures.length > 0) {
            const result = turf.featureCollection(filteredFeatures);
            const blob = new Blob([JSON.stringify(result)], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `extracted_area.geojson`;
            a.click();
            document.getElementById('status').innerText = `Success! Extracted ${filteredFeatures.length} features.`;
        } else {
            document.getElementById('status').innerText = "No features found in the selected circle.";
        }
    }
</script>
</body>
</html>
