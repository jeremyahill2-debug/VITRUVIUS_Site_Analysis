<!DOCTYPE html>
<html>
<head>
    <title>NL GIS Downloader - Final Corrected</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; font-family: sans-serif; background: #1a1a1a; }
        #map { height: 100vh; width: 100%; background: #000; cursor: crosshair; }
        #ui {
            position: absolute; top: 15px; right: 15px; z-index: 1000;
            background: white; padding: 20px; border-radius: 12px; width: 220px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
        }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; cursor: pointer; padding: 12px; background: #007bff; color: white; border: none; border-radius: 6px; font-weight: bold; }
        #status { font-size: 12px; margin-top: 10px; color: #555; line-height: 1.4; }
    </style>
</head>
<body>

<div id="ui">
    <strong style="color: #333;">Radius (meters)</strong>
    <input type="number" id="radius" value="500">
    <button onclick="downloadData()">Download Maatvoering</button>
    <div id="status">Click map inside the Netherlands.</div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const map = L.map('map').setView([52.2, 5.3], 7);

    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
        attribution: '©OpenStreetMap'
    }).addTo(map);

    // Netherlands Mask Logic
    const maskStyle = { color: 'none', fillColor: '#333', fillOpacity: 0.6, interactive: false };
    const nl = { n: 53.7, s: 50.7, w: 3.2, e: 7.3 };
    L.rectangle([[90, -180], [nl.n, 180]], maskStyle).addTo(map); 
    L.rectangle([[nl.s, -180], [-90, 180]], maskStyle).addTo(map); 
    L.rectangle([[nl.n, -180], [nl.s, nl.w]], maskStyle).addTo(map); 
    L.rectangle([[nl.n, nl.e], [nl.s, 180]], maskStyle).addTo(map); 

    // WMS layers for visuals
    L.tileLayer.wms('https://service.pdok.nl/lv/bag/wms/v2_0', { layers: 'pand', transparent: true, format: 'image/png', minZoom: 16 }).addTo(map);
    L.tileLayer.wms('https://service.pdok.nl/kadaster/plu/wms/v1_0', { layers: 'Maatvoering', transparent: true, format: 'image/png', minZoom: 14 }).addTo(map);

    let selectedPoint = null;
    let circlePreview = null;
    const radiusInput = document.getElementById('radius');
    const statusDiv = document.getElementById('status');

    function updateCircle() {
        if (!selectedPoint) return;
        const r = parseInt(radiusInput.value) || 0;
        if (circlePreview) {
            circlePreview.setLatLng(selectedPoint).setRadius(r);
        } else {
            circlePreview = L.circle(selectedPoint, { radius: r, color: '#007bff', fillOpacity: 0.2, weight: 2 }).addTo(map);
        }
    }

    radiusInput.addEventListener('input', updateCircle);
    map.on('click', (e) => { selectedPoint = e.latlng; updateCircle(); statusDiv.innerHTML = "Target set."; });

async function downloadData() {
    if (!selectedPoint) return alert("Click map first.");
    const r = radiusInput.value;
    statusDiv.innerText = "Requesting 2026 API...";

    // 1. Calculate Bounding Box (BBOX) in Lat/Lon for the new OGC API
    const offset = r / 111320; 
    const bbox = [
        selectedPoint.lng - offset,
        selectedPoint.lat - offset,
        selectedPoint.lng + offset,
        selectedPoint.lat + offset
    ].join(',');

    // 2. Updated 2026 Endpoint for Ruimtelijke Plannen
    // The collection name is 'maatvoering'
    const baseUrl = "https://api.pdok.nl/kadaster/plu/ogc/v1_0";
    const url = `${baseUrl}/collections/maatvoering/items?bbox=${bbox}&limit=1000&f=json`;

    // 3. Using the proxy to bypass CORS
    const proxiedUrl = `https://corsproxy.io/?${encodeURIComponent(url)}`;

    try {
        const res = await fetch(proxiedUrl);
        
        if (res.status === 404) {
            statusDiv.innerText = "Error 404: Layer 'maatvoering' not found in this API version.";
            return;
        }

        if (!res.ok) throw new Error(`Server Error: ${res.status}`);

        const data = await res.json();
        
        if (data.features && data.features.length > 0) {
            const blob = new Blob([JSON.stringify(data)], {type: 'application/json'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `maatvoering_export.geojson`;
            a.click();
            statusDiv.innerText = `Success! Found ${data.features.length} features.`;
        } else {
            statusDiv.innerText = "No features found in this specific area.";
        }
    } catch (e) {
        statusDiv.innerText = "API Error. See console.";
        console.error("PDOK Fetch Detail:", e);
    }
}
    
</script>
</body>
</html>
