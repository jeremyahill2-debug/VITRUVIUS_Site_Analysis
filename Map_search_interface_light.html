 <!DOCTYPE html>

<html>

<head>

    <title>NL GIS Downloader</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>

        body { margin: 0; font-family: sans-serif; background: #1a1a1a; }

        #map { height: 100vh; width: 100%; background: #000; cursor: crosshair; }

        #ui {

            position: absolute; top: 15px; right: 15px; z-index: 1000;

            background: white; padding: 20px; border-radius: 12px; width: 220px;

            box-shadow: 0 4px 20px rgba(0,0,0,0.4);

        }

        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }

        button { width: 100%; cursor: pointer; padding: 12px; background: #007bff; color: white; border: none; border-radius: 6px; font-weight: bold; }

        #status { font-size: 12px; margin-top: 10px; color: #555; line-height: 1.4; }

    </style>

</head>

<body>


<div id="ui">

    <strong style="color: #333;">Search Radius (meters)</strong>

    <input type="number" id="radius" value="1000">

    <button onclick="downloadData()">Download GIS Data</button>

    <div id="status">Zoom in deep to see house numbers.</div>

</div>


<div id="map"></div>


<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

    // 1. Initialize Map

    const map = L.map('map').setView([52.2, 5.3], 7);


    // 2. Base Layer (Standard Light)

    const baseLayer = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {

        attribution: '©OpenStreetMap'

    }).addTo(map);

 
     // Visual Overlay of the Maatvoering data so you know where to click
    const maatvoeringWMS = L.tileLayer.wms('https://service.pdok.nl/kadaster/plu/wms/v1_0', {
        layers: 'Maatvoering',
        format: 'image/png',
        transparent: true,
        version: '1.3.0',
        opacity: 0.7
    }).addTo(map);



    // 3. BAG House Numbers Layer (Updated Endpoint)

    // We use the 'standaard' layer from the BAG WMS which includes numbers/outlines

    const bagLayer = L.tileLayer.wms('https://service.pdok.nl/lv/bag/wms/v2_0', {

        layers: 'pand', // 'pand' often contains the house number labels in this WMS

        format: 'image/png',

        transparent: true,

        version: '1.3.0',

        minZoom: 17, // Increased zoom requirement for server stability

        attribution: '© PDOK BAG'

    }).addTo(map);


    // 4. Added: BRT Text Labels (Backup for house numbers/street names)

    L.tileLayer.wms('https://service.pdok.nl/brt/achtergrondkaart/wms/v2_0', {

        layers: 'teksten',

        format: 'image/png',

        transparent: true,

        minZoom: 17

    }).addTo(map);


    let selectedPoint = null;

    let circlePreview = null;


    // 5. Mask Logic

    const maskStyle = { color: 'none', fillColor: '#333', fillOpacity: 0.6, interactive: false };

    const nl = { n: 53.7, s: 50.7, w: 3.2, e: 7.3 };

    L.rectangle([[90, -180], [nl.n, 180]], maskStyle).addTo(map); 

    L.rectangle([[nl.s, -180], [-90, 180]], maskStyle).addTo(map); 

    L.rectangle([[nl.n, -180], [nl.s, nl.w]], maskStyle).addTo(map); 

    L.rectangle([[nl.n, nl.e], [nl.s, 180]], maskStyle).addTo(map); 


    // 6. Interaction

    const radiusInput = document.getElementById('radius');

    function updateCircle() {

        if (!selectedPoint) return;

        const r = parseInt(radiusInput.value) || 0;

        if (circlePreview) {

            circlePreview.setLatLng(selectedPoint).setRadius(r);

        } else {

            circlePreview = L.circle(selectedPoint, { radius: r, color: '#ff4757', fillOpacity: 0.4 }).addTo(map);

        }

    }


    radiusInput.addEventListener('input', updateCircle);

    map.on('click', function(e) {

        selectedPoint = e.latlng;

        updateCircle();

        document.getElementById('status').innerHTML = `<b>Target:</b> ${selectedPoint.lat.toFixed(4)}, ${selectedPoint.lng.toFixed(4)}`;

    });


    async function downloadData() {

        if (!selectedPoint) return alert("Click map first.");

        const r = radiusInput.value;

        const url = `https://service.pdok.nl/brt/top10nl/wfs/v1_0?service=WFS&version=2.0.0&request=GetFeature&typeNames=top10nl:gebouw&outputFormat=application/json&srsName=EPSG:4326&CQL_FILTER=DWITHIN(geometrie,POINT(${selectedPoint.lng} ${selectedPoint.lat}),${r},meters)`;


        try {

            const res = await fetch(url);

            const data = await res.json();

            const blob = new Blob([JSON.stringify(data)], {type: 'application/json'});

            const a = document.createElement('a');

            a.href = URL.createObjectURL(blob);

            a.download = `nl_data.geojson`;

            a.click();

            document.getElementById('status').innerText = `Success! Got ${data.features.length} objects.`;

        } catch (e) { document.getElementById('status').innerText = "Download error."; }

    }

</script>

</body>

</html>
