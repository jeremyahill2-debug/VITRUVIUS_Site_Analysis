<!DOCTYPE html>
<html>
<head>
    <title>NL Omgevingswet - National Extractor 2026</title>
    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
    <script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>
    <style>
        body { margin: 0; font-family: sans-serif; }
        #map { height: 100vh; width: 100%; background: #1a1a1a; }
        #ui {
            position: absolute; top: 20px; left: 20px; z-index: 10;
            background: white; padding: 20px; border-radius: 12px; width: 280px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        button { width: 100%; cursor: pointer; padding: 12px; background: #e91e63; color: white; border: none; border-radius: 6px; font-weight: bold; }
        #status { font-size: 12px; margin-top: 10px; color: #444; font-weight: bold; }
    </style>
</head>
<body>

<div id="ui">
    <h3>2026 National Extractor</h3>
    <p style="font-size: 11px; color: #666;">Data: Omgevingswet (Productie Actueel)<br>Zoom in to see neon pink shapes.</p>
    <button onclick="extractData()">Extract Selection</button>
    <div id="status">Loading Production Tiles...</div>
</div>

<div id="map"></div>

<script>
    const map = new maplibregl.Map({
        container: 'map',
        style: 'https://basemaps.cartocdn.com/gl/dark-matter-gl-style/style.json',
        center: [4.4791, 51.9225], // Centered on Rotterdam for testing
        zoom: 14
    });

    map.on('load', () => {
        // PRODUCTION 2026 ENDPOINT
        map.addSource('ow_prod', {
            type: 'vector',
            tiles: ['https://api.pdok.nl/kadaster/omgevingswet-geometrieen/ogc/v2/collections/productie-actueel/tiles/WebMercatorQuad/{z}/{y}/{x}.pbf'],
            minzoom: 10,
            maxzoom: 16
        });

        // The layer inside these tiles is usually named 'geometrie' or the name of the collection
        map.addLayer({
            'id': 'ow-layer',
            'type': 'fill',
            'source': 'ow_prod',
            'source-layer': 'productie-actueel', 
            'paint': {
                'fill-color': '#e91e63',
                'fill-opacity': 0.5,
                'fill-outline-color': '#ffffff'
            }
        });

        document.getElementById('status').innerText = "SYSTEM READY. Zoom into a city.";
    });

    let clickedPoint = null;
    let marker = null;

    map.on('click', (e) => {
        clickedPoint = e.lngLat;
        if (marker) marker.remove();
        marker = new maplibregl.Marker({color: "#e91e63"}).setLngLat(e.lngLat).addTo(map);
        document.getElementById('status').innerText = "Target Selected.";
    });

    function extractData() {
        if (!clickedPoint) return alert("Click the map first!");

        const features = map.querySourceFeatures('ow_prod', {
            sourceLayer: 'productie-actueel'
        });

        if (features.length === 0) {
            document.getElementById('status').innerText = "NO DATA LOADED. Zoom in more!";
            return;
        }

        const center = [clickedPoint.lng, clickedPoint.lat];
        const filtered = features.filter(f => {
            try {
                const dist = turf.distance(center, turf.center(f), {units: 'meters'});
                return dist <= 500; // 500m search radius
            } catch(e) { return false; }
        });

        if (filtered.length > 0) {
            // Deduplicate (tiles repeat features)
            const seen = new Set();
            const unique = filtered.filter(f => {
                const id = JSON.stringify(f.geometry.coordinates);
                return seen.has(id) ? false : seen.add(id);
            });

            const collection = turf.featureCollection(unique.map(f => ({
                type: "Feature",
                geometry: f.geometry,
                properties: f.properties
            })));

            const blob = new Blob([JSON.stringify(collection)], {type: 'application/json'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `omgevingswet_extract.geojson`;
            a.click();
            document.getElementById('status').innerText = `EXPORTED ${unique.length} ITEMS!`;
        } else {
            document.getElementById('status').innerText = "Nothing within 500m.";
        }
    }
</script>
</body>
</html>
