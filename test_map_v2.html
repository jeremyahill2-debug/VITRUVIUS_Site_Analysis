<!DOCTYPE html>
<html>
<head>
    <title>NL Maatvoering Downloader - 2026 Stable</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; font-family: sans-serif; background: #1a1a1a; }
        #map { height: 100vh; width: 100%; }
        #ui {
            position: absolute; top: 20px; left: 20px; z-index: 1000;
            background: white; padding: 20px; border-radius: 12px; width: 260px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        button { width: 100%; cursor: pointer; padding: 12px; background: #28a745; color: white; border: none; border-radius: 6px; font-weight: bold; }
        #status { font-size: 13px; margin-top: 10px; color: #555; }
    </style>
</head>
<body>

<div id="ui">
    <h3>Maatvoering Extractor</h3>
    <p style="font-size: 11px; color: #888;">Click map in a built-up area, then click Download.</p>
    <button onclick="downloadMaatvoering()">Download Area (500m)</button>
    <div id="status">Click map to set target.</div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const map = L.map('map').setView([52.09, 5.12], 13); // Start in Utrecht
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);

    let marker = null;
    let selectedPoint = null;

    map.on('click', (e) => {
        selectedPoint = e.latlng;
        if (marker) marker.remove();
        marker = L.marker(e.latlng).addTo(map);
        document.getElementById('status').innerText = "Location set. Ready.";
    });

    async function downloadMaatvoering() {
        if (!selectedPoint) return alert("Click the map first!");
        const status = document.getElementById('status');
        status.innerText = "Querying PDOK...";

        // The correct 2026 WFS endpoint for planning data
        const baseUrl = "https://service.pdok.nl/kadaster/plu/wfs/v1_0";
        
        // We use EPSG:4326 but PDOK WFS 2.0.0 expects Lat/Lon order in the filter
        const cql = `DWITHIN(geometrie,POINT(${selectedPoint.lat} ${selectedPoint.lng}),500,meters)`;
        
        const params = new URLSearchParams({
            service: 'WFS',
            version: '2.0.0',
            request: 'GetFeature',
            typeName: 'maatvoering',
            outputFormat: 'application/json',
            srsName: 'EPSG:4326',
            CQL_FILTER: cql
        });

        // Using a reliable CORS proxy
        const fullUrl = `${baseUrl}?${params.toString()}`;
        const proxiedUrl = `https://corsproxy.io/?${encodeURIComponent(fullUrl)}`;

        try {
            const res = await fetch(proxiedUrl);
            if (!res.ok) throw new Error(`Server Error: ${res.status}`);
            
            const data = await res.json();

            if (data.features && data.features.length > 0) {
                const blob = new Blob([JSON.stringify(data)], {type: 'application/json'});
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = `maatvoering_extract.geojson`;
                a.click();
                status.innerText = `Success! Found ${data.features.length} items.`;
            } else {
                status.innerText = "No data found here. Try a city center.";
            }
        } catch (err) {
            console.error(err);
            status.innerText = "Error. Check console (F12).";
        }
    }
</script>
</body>
</html>
