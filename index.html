<!DOCTYPE html>
<html>
<head>
    <title>NL GIS Downloader</title>
    <link rel="stylesheet" href="[https://unpkg.com/leaflet@1.9.4/dist/leaflet.css](https://unpkg.com/leaflet@1.9.4/dist/leaflet.css)" />
    <style>
        body { margin: 0; font-family: sans-serif; background: #1a1a1a; }
        #map { height: 100vh; width: 100%; background: #222; }
        #ui {
            position: absolute; top: 15px; right: 15px; z-index: 1000;
            background: white; padding: 15px; border-radius: 8px; width: 180px;
        }
        button { width: 100%; margin-top: 10px; cursor: pointer; padding: 8px; background: #007bff; color: white; border: none; border-radius: 4px; }
        #status { font-size: 11px; margin-top: 8px; color: #444; }
    </style>
</head>
<body>

<div id="ui">
    <strong>Radius (meters)</strong>
    <input type="number" id="radius" value="1000" style="width: 100%;">
    <button onclick="downloadData()">Download Data</button>
    <div id="status">Click on the Netherlands</div>
</div>

<div id="map"></div>

<script src="[https://unpkg.com/leaflet@1.9.4/dist/leaflet.js](https://unpkg.com/leaflet@1.9.4/dist/leaflet.js)"></script>
<script>
    // 1. Setup Map
    const map = L.map('map').setView([52.2, 5.3], 7);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    let selectedPoint = null;
    let circlePreview = null;

    // 2. Hardcoded simplified NL Boundary (Avoids CORS issues)
    // This is a simplified "hull" of the Netherlands to ensure the mask works immediately.
    const nlHull = [
        [53.45, 6.84], [53.35, 7.21], [52.88, 7.07], [52.41, 7.05], [51.85, 6.85], 
        [51.24, 6.03], [50.76, 6.08], [50.75, 5.68], [51.21, 5.37], [51.27, 4.25], 
        [51.45, 3.36], [51.74, 3.73], [52.32, 4.43], [52.71, 4.61], [53.18, 4.79], 
        [53.48, 5.42], [53.45, 6.84]
    ];

    const worldLimit = [[90, -180], [90, 180], [-90, 180], [-90, -180], [90, -180]];

    // Create Mask
    L.polygon([worldLimit, nlHull], {
        fillColor: '#000',
        fillOpacity: 0.75,
        color: '#222',
        weight: 2,
        interactive: false
    }).addTo(map);

    // 3. Interaction
    map.on('click', function(e) {
        selectedPoint = e.latlng;
        const r = parseInt(document.getElementById('radius').value);
        if (circlePreview) map.removeLayer(circlePreview);
        circlePreview = L.circle(selectedPoint, { radius: r, color: 'cyan' }).addTo(map);
        document.getElementById('status').innerText = `Point: ${selectedPoint.lat.toFixed(3)}, ${selectedPoint.lng.toFixed(3)}`;
    });

    // 4. Download Logic (PDOK)
    async function downloadData() {
        if (!selectedPoint) return alert("Select a point on the map.");
        const r = document.getElementById('radius').value;
        const status = document.getElementById('status');
        status.innerText = "Downloading...";

        // Querying "top10nl:gebouw" (Buildings)
        const url = `[https://service.pdok.nl/brt/top10nl/wfs/v1_0?service=WFS&version=2.0.0&request=GetFeature&typeNames=top10nl:gebouw&outputFormat=application/json&srsName=EPSG:4326&CQL_FILTER=DWITHIN(geometrie,POINT($](https://service.pdok.nl/brt/top10nl/wfs/v1_0?service=WFS&version=2.0.0&request=GetFeature&typeNames=top10nl:gebouw&outputFormat=application/json&srsName=EPSG:4326&CQL_FILTER=DWITHIN(geometrie,POINT($){selectedPoint.lng} ${selectedPoint.lat}),${r},meters)`;

        try {
            const res = await fetch(url);
            const data = await res.json();
            if (data.features.length === 0) {
                status.innerText = "No objects found.";
                return;
            }
            const blob = new Blob([JSON.stringify(data)], {type: 'application/json'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'netherlands_gis_data.geojson';
            a.click();
            status.innerText = `Done! Got ${data.features.length} items.`;
        } catch (e) {
            status.innerText = "Fetch error (Check Radius)";
        }
    }
</script>
</body>
</html>
