<!DOCTYPE html>
<html>
<head>
    <title>NL GIS Radius Downloader</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a1a; }
        #map { height: 100vh; width: 100%; background: #222; }
        #ui-panel {
            position: absolute; top: 20px; right: 20px; z-index: 1000;
            background: rgba(255, 255, 255, 0.95); padding: 20px; border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); width: 220px;
        }
        input { width: 100%; padding: 8px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { 
            width: 100%; cursor: pointer; background: #2c3e50; color: white; 
            border: none; padding: 10px; border-radius: 4px; font-weight: bold;
        }
        button:hover { background: #34495e; }
        #status { font-size: 11px; color: #555; margin-top: 10px; line-height: 1.4; }
    </style>
</head>
<body>

<div id="ui-panel">
    <strong style="color: #2c3e50;">Search Radius (m)</strong>
    <input type="number" id="radius" value="1000">
    <button onclick="downloadData()">Download GeoJSON</button>
    <div id="status">Click anywhere in the Netherlands to select a point.</div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const map = L.map('map').setView([52.1326, 5.2913], 7);
    let selectedPoint = null;
    let circlePreview = null;

    // 1. Add the Map Tiles
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap'
    }).addTo(map);

    // 2. Fetch NL Border and Create the "Grey-Out" Mask
    fetch('https://raw.githubusercontent.com/codeforgermany/click-that-hood/master/public/data/netherlands.geojson')
        .then(res => res.json())
        .then(geojsonData => {
            // This is the "Inverted Polygon" trick
            // Coordinates for a rectangle covering the whole world
            const worldCoords = [
                [[-180, 90], [180, 90], [180, -90], [-180, -90], [-180, 90]]
            ];
            
            // Add the NL boundary coordinates as a 'hole' in the world
            // Most NL GeoJSONs have multiple polygons (islands), so we loop through them
            const holes = geojsonData.features[0].geometry.coordinates;
            
            const mask = L.polygon([worldCoords, ...holes], {
                color: '#000',
                weight: 2,
                fillColor: '#333333', // The grey-out color
                fillOpacity: 0.85,
                interactive: false // Allows clicks to pass through to the map
            }).addTo(map);
        });

    // 3. Map Interaction
    map.on('click', function(e) {
        selectedPoint = e.latlng;
        const r = parseInt(document.getElementById('radius').value);

        if (circlePreview) map.removeLayer(circlePreview);
        circlePreview = L.circle(selectedPoint, {
            radius: r,
            color: '#e74c3c',
            fillColor: '#e74c3c',
            fillOpacity: 0.3
        }).addTo(map);
        
        document.getElementById('status').innerHTML = `<b>Target Set:</b><br>${selectedPoint.lat.toFixed(4)}, ${selectedPoint.lng.toFixed(4)}`;
    });

    // 4. PDOK Data Fetcher
    async function downloadData() {
        if (!selectedPoint) {
            alert("Click the map first!");
            return;
        }

        const radius = document.getElementById('radius').value;
        const status = document.getElementById('status');
        status.innerText = "Querying PDOK database...";

        const wfsUrl = "https://service.pdok.nl/brt/top10nl/wfs/v1_0";
        // Querying for 'gebouw' (buildings) as it's more visually interesting than 'waterdeel'
        const typeName = "top10nl:gebouw"; 
        const cqlFilter = `DWITHIN(geometrie, POINT(${selectedPoint.lng} ${selectedPoint.lat}), ${radius}, meters)`;
        
        const fullUrl = `${wfsUrl}?service=WFS&version=2.0.0&request=GetFeature&typeNames=${typeName}&outputFormat=application/json&srsName=EPSG:4326&CQL_FILTER=${encodeURIComponent(cqlFilter)}`;

        try {
            const response = await fetch(fullUrl);
            const data = await response.json();
            
            if (!data.features || data.features.length === 0) {
                status.innerText = "No objects found in that radius. Try a larger number or a different spot.";
                return;
            }

            const blob = new Blob([JSON.stringify(data)], { type: "application/json" });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `nl_gis_export.geojson`;
            a.click();
            
            status.innerText = `Success! Downloaded ${data.features.length} objects.`;
        } catch (error) {
            status.innerText = "Error: Check your connection or radius.";
            console.error(error);
        }
    }
</script>
</body>
</html>
