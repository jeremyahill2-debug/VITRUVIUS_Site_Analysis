<!DOCTYPE html>
<html>
<head>
    <title>NL GIS Downloader</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; font-family: sans-serif; background: #1a1a1a; }
        #map { height: 100vh; width: 100%; background: #000; }
        #ui {
            position: absolute; top: 15px; right: 15px; z-index: 1000;
            background: white; padding: 20px; border-radius: 12px; width: 220px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
        }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; cursor: pointer; padding: 12px; background: #007bff; color: white; border: none; border-radius: 6px; font-weight: bold; }
        #status { font-size: 12px; margin-top: 10px; color: #555; line-height: 1.4; }
    </style>
</head>
<body>

<div id="ui">
    <strong style="color: #333;">Search Radius (meters)</strong>
    <input type="number" id="radius" value="1000">
    <button onclick="downloadData()">Download GIS Data</button>
    <div id="status">Click inside the Netherlands to select a location.</div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>


    // 1. Updated Mask Logic (Ensure 'interactive: false' is on all rectangles)
    const maskStyle = { 
        color: 'none', 
        fillColor: '#333', 
        fillOpacity: 0.6, 
        interactive: false // THIS IS KEY: allows clicking through the mask
    };
    
    const nl = { n: 53.7, s: 50.7, w: 3.2, e: 7.3 };

    L.rectangle([[90, -180], [nl.n, 180]], maskStyle).addTo(map); 
    L.rectangle([[nl.s, -180], [-90, 180]], maskStyle).addTo(map); 
    L.rectangle([[nl.n, -180], [nl.s, nl.w]], maskStyle).addTo(map); 
    L.rectangle([[nl.n, nl.e], [nl.s, 180]], maskStyle).addTo(map); 

    // 2. Improved Interaction Logic
    const radiusInput = document.getElementById('radius');

    function updateCircle() {
        if (!selectedPoint) return;
        
        const r = parseInt(radiusInput.value) || 0;
        
        if (circlePreview) {
            // Update both position and radius so it "moves" to the new click
            circlePreview.setLatLng(selectedPoint);
            circlePreview.setRadius(r);
        } else {
            circlePreview = L.circle(selectedPoint, { 
                radius: r, 
                color: '#ff4757', 
                fillColor: '#ff4757', 
                fillOpacity: 0.4 
            }).addTo(map);
        }
    }

    // Update size when typing
    radiusInput.addEventListener('input', updateCircle);

    // Update position and size when clicking (allows unlimited relocation)
    map.on('click', function(e) {
        selectedPoint = e.latlng;
        updateCircle(); 
        
        document.getElementById('status').innerHTML = `<b>New Target Set:</b><br>${selectedPoint.lat.toFixed(4)}, ${selectedPoint.lng.toFixed(4)}`;
    });


    // 3. Interaction Logic
    const radiusInput = document.getElementById('radius');

    // Function to update the circle's size
    function updateCircle() {
        if (!selectedPoint) return;
        
        const r = parseInt(radiusInput.value) || 0; // Fallback to 0 if empty
        
        if (circlePreview) {
            circlePreview.setRadius(r); // Dynamically resize
        } else {
            // If no circle exists yet, create one
            circlePreview = L.circle(selectedPoint, { 
                radius: r, 
                color: '#ff4757', 
                fillColor: '#ff4757', 
                fillOpacity: 0.4 
            }).addTo(map);
        }
    }

    // Listen for typing or clicking the up/down arrows in the input box
    radiusInput.addEventListener('input', updateCircle);

    // Map Click Interaction
    map.on('click', function(e) {
        selectedPoint = e.latlng;
        updateCircle(); // Create/move the circle when clicking
        
        document.getElementById('status').innerHTML = `<b>Target Set:</b><br>${selectedPoint.lat.toFixed(4)}, ${selectedPoint.lng.toFixed(4)}`;
    });

    // 4. PDOK WFS Downloader
    async function downloadData() {
        if (!selectedPoint) return alert("Please click the map first.");
        
        const r = document.getElementById('radius').value;
        const status = document.getElementById('status');
        status.innerText = "Querying PDOK (Top10NL Buildings)...";

        // Querying "top10nl:gebouw" (Buildings)
        const url = `https://service.pdok.nl/brt/top10nl/wfs/v1_0?service=WFS&version=2.0.0&request=GetFeature&typeNames=top10nl:gebouw&outputFormat=application/json&srsName=EPSG:4326&CQL_FILTER=DWITHIN(geometrie,POINT(${selectedPoint.lng} ${selectedPoint.lat}),${r},meters)`;

        try {
            const res = await fetch(url);
            const data = await res.json();
            
            if (!data.features || data.features.length === 0) {
                status.innerText = "No buildings found in this radius. Try a larger number.";
                return;
            }

            const blob = new Blob([JSON.stringify(data)], {type: 'application/json'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `nl_buildings_${r}m.geojson`;
            a.click();
            
            status.innerText = `Success! Downloaded ${data.features.length} buildings.`;
        } catch (e) {
            status.innerText = "Error: Radius might be too large or server is busy.";
        }
    }
</script>
</body>
</html>
