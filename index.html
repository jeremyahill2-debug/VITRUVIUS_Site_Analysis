<!DOCTYPE html>
<html>
<head>
    <title>NL GIS Radius Downloader</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #1a1a1a; }
        #map { height: 100vh; width: 100%; background: #222; }
        #ui-panel {
            position: absolute; top: 20px; right: 20px; z-index: 1000;
            background: rgba(255, 255, 255, 0.9); padding: 15px; border-radius: 8px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); width: 200px;
        }
        input { width: 100%; padding: 8px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; }
        button { 
            width: 100%; cursor: pointer; background: #2c3e50; color: white; 
            border: none; padding: 10px; border-radius: 4px; font-weight: bold;
        }
        #status { font-size: 11px; color: #333; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>

<div id="ui-panel">
    <strong>Radius (meters)</strong>
    <input type="number" id="radius" value="1000">
    <button onclick="downloadData()">Download Data</button>
    <div id="status">Loading boundary...</div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // Initialize map
    const map = L.map('map', {
        center: [52.1326, 5.2913],
        zoom: 7,
        minZoom: 6
    });

    // Add Tiles
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    let selectedPoint = null;
    let circlePreview = null;

    // THE MASK LOGIC
    async function setupMask() {
        try {
            const response = await fetch('https://raw.githubusercontent.com/codeforgermany/click-that-hood/master/public/data/netherlands.geojson');
            const data = await response.json();
            
            // World boundary (counter-clockwise)
            const world = [
                [90, -180], [90, 180], [-90, 180], [-90, -180], [90, -180]
            ];

            // Extract NL coordinates and flip them for Leaflet [Lat, Lon]
            // We handle both Polygon and MultiPolygon
            const features = data.features[0].geometry.coordinates;
            const holes = data.features[0].geometry.type === "Polygon" 
                ? [features[0].map(p => [p[1], p[0]])]
                : features.map(shape => shape[0].map(p => [p[1], p[0]]));

            // Create the mask: [Outer Boundary, Hole1, Hole2...]
            L.polygon([world, ...holes], {
                fillColor: '#000',
                fillOpacity: 0.7,
                weight: 2,
                color: '#333',
                interactive: false
            }).addTo(map);

            document.getElementById('status').innerText = "Click map to select point";
        } catch (e) {
            console.error(e);
            document.getElementById('status').innerText = "Error loading mask.";
        }
    }

    setupMask();

    map.on('click', function(e) {
        selectedPoint = e.latlng;
        const r = parseInt(document.getElementById('radius').value);
        if (circlePreview) map.removeLayer(circlePreview);
        circlePreview = L.circle(selectedPoint, { radius: r, color: 'red' }).addTo(map);
        document.getElementById('status').innerText = `Point: ${selectedPoint.lat.toFixed(3)}, ${selectedPoint.lng.toFixed(3)}`;
    });

    async function downloadData() {
        if (!selectedPoint) return alert("Click map first");
        document.getElementById('status').innerText = "Fetching PDOK data...";
        
        const r = document.getElementById('radius').value;
        const url = `https://service.pdok.nl/brt/top10nl/wfs/v1_0?service=WFS&version=2.0.0&request=GetFeature&typeNames=top10nl:gebouw&outputFormat=application/json&srsName=EPSG:4326&CQL_FILTER=DWITHIN(geometrie,POINT(${selectedPoint.lng} ${selectedPoint.lat}),${r},meters)`;

        try {
            const res = await fetch(url);
            const json = await res.json();
            const blob = new Blob([JSON.stringify(json)], {type: 'application/json'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'export.geojson';
            a.click();
            document.getElementById('status').innerText = `Downloaded ${json.features.length} objects!`;
        } catch (e) {
            alert("Error fetching data.");
        }
    }
</script>
</body>
</html>
